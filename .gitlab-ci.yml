stages:
  - execute

neural_proof_run:
  stage: execute
  image: python:3.12
  script:
    - pip install requests
    - python run_proof_engine.py
    - git config --global user.name 'Governor-Bot-GitLab'
    - git config --global user.email 'governor@synaptic.ai'
    - git add continuity_ledger.json
    - git diff --staged --quiet || (git commit -m "AUTOSYNC: GitLab Redundancy Proof Sealed" && git push)
  only:
    - main
    - schedules
